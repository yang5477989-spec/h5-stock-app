<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>短线精灵 - 实时版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0f1419;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .bg-dark { background: #0f1419; }
        .bg-card { background: #1a2332; }
        .text-red { color: #ff4757; }
        .text-green { color: #2ed573; }
        .text-gold { color: #ffa502; }
        .text-gray { color: #747d8c; }

        .tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
        .tag-red { background: #ff4757; color: white; }
        .tag-green { background: #2ed573; color: white; }
        .tag-gold { background: #ffa502; color: #0f1419; }
        .tag-blue { background: #3742fa; color: white; }
        .tag-purple { background: #a55eea; color: white; }
        .tag-gray { background: #57606f; color: white; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a2332;
            border-top: 1px solid #2f3542;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #57606f;
            font-size: 10px;
            padding: 4px 16px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item.active { color: #ff4757; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }

        .card {
            background: #1a2332;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .rank-tag {
            position: absolute;
            top: 0;
            left: 0;
            background: #ffa502;
            color: #0f1419;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 8px 0 8px 0;
        }

        .tab-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-item {
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            background: #2f3542;
            color: #747d8c;
        }
        .tab-item.active {
            background: #ff4757;
            color: white;
        }
        .tab-item:active { opacity: 0.8; }

        .stock-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #2f3542;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stock-row:last-child { border-bottom: none; }
        .stock-row:active { background: #2f3542; }

        .index-card {
            background: #1a2332;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .index-name {
            font-size: 12px;
            color: #747d8c;
            margin-bottom: 4px;
        }
        .index-price {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .index-change {
            font-size: 12px;
        }

        .tag-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .tag-scroll::-webkit-scrollbar { display: none; }
        .tag-chip {
            padding: 5px 14px;
            border-radius: 14px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            background: #2f3542;
            color: #a4b0be;
            transition: all 0.2s;
        }
        .tag-chip.active { background: #ff4757; color: white; }

        .bar-chart {
            height: 4px;
            border-radius: 2px;
            background: #2f3542;
            margin-top: 6px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .mood-bar {
            height: 6px;
            border-radius: 3px;
            background: #2f3542;
            margin-top: 8px;
            overflow: hidden;
        }
        .mood-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease, background 1s ease;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rank-badge {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #57606f;
        }

        .shichen-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            background: #3742fa;
            color: white;
        }

        .hot-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            background: #ff6b81;
            color: white;
        }

        .zhang-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            background: #ff4757;
            color: white;
        }

        .loading-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff4757;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        input[type="text"] {
            background: #2f3542;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            color: white;
            font-size: 14px;
            width: 100%;
            outline: none;
        }
        input[type="text"]::placeholder { color: #57606f; }

        .btn-add {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .market-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #747d8c;
            margin-bottom: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-open { background: #2ed573; animation: pulse 2s infinite; }
        .status-closed { background: #ff4757; }
        .status-pre { background: #ffa502; animation: pulse 2s infinite; }
    </style>
</head>

<script>
// ==================== 配置 ====================
const CONFIG = {
    EM_UT: 'fa5fd1943c7b386f172d6893dbfba10b',
    // secid: 1=沪市, 0=深市
    INDEX_CODES: {
        sh: '1.000001',  // 上证
        sz: '0.399001',  // 深证
        cy: '0.399006',  // 创业板
        hs300: '1.000300', // 沪深300
        sh50: '1.000016'   // 上证50
    }
};

// ==================== 东方财富API ====================
// push2.eastmoney.com - CORS: *, UTF-8, JSON格式
// 字段索引(东方财富push2实时API):
//   f43=现价×100  f44=今高×100  f45=今低×100  f46=今开×100
//   f47=成交量    f48=成交额(元)
//   f57=代码      f58=名称

function emField(ids) {
    return 'f43,f44,f45,f46,f47,f48,f57,f58,f169,f170,f171,f107,f116,f117';
}

// 获取个股/指数实时数据
async function fetchEMStock(secid) {
    const url = `https://push2.eastmoney.com/api/qt/stock/get?secid=${secid}&fields=${emField()}&ut=${CONFIG.EM_UT}`;
    try {
        const resp = await fetch(url);
        if (!resp.ok) return null;
        const json = await resp.json();
        if (json.rc !== 0 || !json.data) return null;
        const d = json.data;
        const price = (d.f43 || 0) / 100;
        const high = (d.f44 || 0) / 100;
        const low = (d.f45 || 0) / 100;
        const open = (d.f46 || 0) / 100;
        const volume = d.f47 || 0;
        const amount = d.f48 || 0;
        // 昨收 = 现价 - 涨跌额
        const chgAmt = (d.f169 || 0) / 100;
        const chgPct = (d.f170 || 0) / 100;
        const prevClose = price - chgAmt;
        return {
            name: d.f58 || '--',
            code: d.f57 || '',
            price: price,
            prevClose: prevClose,
            open: open,
            high: high,
            low: low,
            volume: volume,
            amount: amount,
            change: chgAmt,
            changePct: chgPct,
        };
    } catch (e) {
        console.error('EM stock error:', secid, e);
        return null;
    }
}

// 批量获取指数
async function fetchEMStocks(secids) {
    // Eastmoney push2不支持批量，只能逐个请求
    const promises = secids.map(s => fetchEMStock(s));
    const results = await Promise.all(promises.map(p => p.catch(() => null)));
    return results.filter(r => r !== null);
}

// 获取板块/股票列表
async function fetchEMList(fs, sortField, sortOrder, pn, pz) {
    const url = `https://push2.eastmoney.com/api/qt/clist/get?pn=${pn}&pz=${pz}&po=${sortOrder === 'desc' ? 1 : 0}&np=1&fltt=2&invt=2&fid=${sortField}&fs=${fs}&fields=f2,f3,f4,f5,f6,f7,f8,f12,f13,f14,f15,f16,f17,f18&cb=&ut=${CONFIG.EM_UT}`;
    try {
        const resp = await fetch(url);
        if (!resp.ok) return [];
        const json = await resp.json();
        if (json.data && json.data.diff) {
            return json.data.diff.map(item => ({
                code: item.f12,
                name: item.f14,
                price: item.f2 / 100,
                change: item.f4 / 100,
                changePct: item.f3 / 100,
                vol: item.f5,
                amount: item.f6,
                hs: item.f8 / 100,
                open: item.f15 / 100,
                high: item.f16 / 100,
                low: item.f17 / 100,
                close: item.f18 / 100,
                zt: item.f3 >= 999  // 涨停判断
            }));
        }
        return [];
    } catch (e) {
        console.error('EM list error:', e);
        return [];
    }
}

// ==================== 工具函数 ====================
function formatPrice(p) {
    if (!p || p === 0) return '--';
    return p.toFixed(2);
}

function formatChange(c) {
    if (!c || c === 0) return '--';
    return (c >= 0 ? '+' : '') + c.toFixed(2);
}

function formatPct(p) {
    if (!p || p === 0) return '--';
    return (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
}

function formatAmount(a) {
    if (!a) return '--';
    if (a >= 1e12) return (a / 1e12).toFixed(2) + '万亿';
    if (a >= 1e8) return (a / 1e8).toFixed(2) + '亿';
    if (a >= 1e4) return (a / 1e4).toFixed(2) + '万';
    return a.toFixed(2);
}

function fmtVol(v) {
    if (!v) return '--';
    if (v >= 1e8) return (v / 1e8).toFixed(2) + '亿';
    if (v >= 1e4) return (v / 1e4).toFixed(2) + '万';
    return v.toFixed(0);
}

function isUp(c) {
    return c > 0;
}

function isDown(c) {
    return c < 0;
}

function upOrDown(c) {
    if (c > 0) return 'red';
    if (c < 0) return 'green';
    return 'gray';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.display = 'none'; }, 2000);
}

// ==================== 页面导航 ====================
let currentPage = 'home';

function switchPage(page) {
    currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('active', n.dataset.page === page);
    });
    // 触发对应页面的数据刷新
    if (page === 'board') loadBoard();
    if (page === 'lianban') loadLianban();
    if (page === 'xuangu') loadXuangu();
    if (page === 'zixuan') renderZixuan();
}

document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => switchPage(item.dataset.page));
});

// ==================== 首页数据 ====================
async function loadHome() {
    updateMarketStatus();
    await Promise.all([
        loadIndexData(),
        loadHotStocks(),
        loadZTBoard()
    ]);
    updateMood();
}

// 市场状态
function updateMarketStatus() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const day = now.getDay();
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');

    if (day === 0 || day === 6) {
        dot.className = 'status-dot status-closed';
        text.textContent = '周末休市';
        return;
    }

    const totalMin = h * 60 + m;
    // 9:15-9:25 集合竞价, 9:30-11:30 上午, 13:00-15:00 下午
    if (totalMin >= 9 * 60 + 15 && totalMin < 9 * 60 + 25) {
        dot.className = 'status-dot status-pre';
        text.textContent = '集合竞价 9:15-9:25';
    } else if (totalMin >= 9 * 60 + 25 && totalMin < 15 * 60) {
        dot.className = 'status-dot status-open';
        text.textContent = '交易中 · ' + now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    } else if (totalMin >= 15 * 60 && totalMin < 15 * 60 + 30) {
        dot.className = 'status-dot status-closed';
        text.textContent = '盘后交易';
    } else {
        dot.className = 'status-dot status-closed';
        text.textContent = '已休市';
    }
}

// 自选股存储: { code, name, secid }
let zixuan = JSON.parse(localStorage.getItem('myZixuan') || '[]');

function saveZixuan() {
    localStorage.setItem('myZixuan', JSON.stringify(zixuan));
}

function addZixuan(code, name, secid) {
    if (!code) return;
    // 如果是纯数字代码，自动判断沪/深
    if (/^\d{6}$/.test(code)) {
        secid = code.startsWith('6') ? '1.' + code : '0.' + code;
    }
    if (zixuan.find(z => z.code === code || z.secid === secid)) {
        showToast('已在自选中');
        return;
    }
    zixuan.push({ code, name: name || code, secid: secid || code });
    saveZixuan();
    renderZixuan();
    showToast('已添加: ' + (name || code));
}

function removeZixuan(index) {
    const name = zixuan[index].name;
    zixuan.splice(index, 1);
    saveZixuan();
    renderZixuan();
    showToast('已删除: ' + name);
}

async function renderZixuan() {
    const container = document.getElementById('zxList');
    const empty = document.getElementById('zxEmpty');
    if (zixuan.length === 0) {
        empty.style.display = '';
        container.innerHTML = '';
        container.appendChild(empty);
        return;
    }
    empty.style.display = 'none';

    const secids = zixuan.map(z => z.secid);
    const stocks = await fetchEMStocks(secids);

    container.innerHTML = stocks.map((s, i) => {
        if (!s) return '';
        const color = upOrDown(s.changePct);
        return `
        <div class="stock-row" data-code="${s.code}" data-name="${s.name}">
            <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:6px;">
                    <span style="font-weight:600;font-size:15px;">${s.name}</span>
                    <span style="font-size:11px;color:#57606f;">${s.code}</span>
                </div>
            </div>
            <div style="text-align:right;margin-right:8px;">
                <div style="font-size:15px;font-weight:600;">${formatPrice(s.price)}</div>
                <div style="font-size:12px;" class="text-${color}">${formatChange(s.change)} ${formatPct(s.changePct)}</div>
            </div>
            <button onclick="event.stopPropagation();removeZixuan(${i})" style="background:none;border:none;color:#ff4757;font-size:18px;cursor:pointer;padding:4px;">✕</button>
        </div>`;
    }).join('');
    if (!stocks || stocks.every(s => !s)) {
        container.innerHTML = '<div class="empty-state">股票代码无效</div>';
    }
    attachStockClick(container);
}

function attachStockClick(container) {
    container.querySelectorAll('.stock-row').forEach(row => {

// 市场情绪
function updateMood() {
    const shEl = document.getElementById('idx-sh-price');
    const szEl = document.getElementById('idx-sz-price');
    const cyEl = document.getElementById('idx-cy-price');

    const sh = parseFloat(shEl.textContent) || 0;
    const sz = parseFloat(szEl.textContent) || 0;
    const cy = parseFloat(cyEl.textContent) || 0;

    if (sh === 0) return;

    // 获取涨跌股数量来计算情绪
    fetchEMList('m:0+t:6,m:0+t:13,m:1+t:2,m:1+t:23', 'f3', 'desc', 1, 200).then(list => {
        if (!list || list.length === 0) return;
        const up = list.filter(s => s.changePct > 0).length;
        const down = list.filter(s => s.changePct < 0).length;
        const total = up + down;
        const ratio = total > 0 ? up / total : 0.5;

        const score = Math.round(ratio * 100);
        const bar = document.getElementById('moodBar');
        const scoreEl = document.getElementById('moodScore');
        const descEl = document.getElementById('moodDesc');

        bar.style.width = score + '%';
        scoreEl.textContent = score + '分';

        let color, desc;
        if (score >= 70) {
            color = '#ff4757'; desc = '市场亢奋 · 上涨股 ' + up + ' / ' + down + ' 下';
        } else if (score >= 55) {
            color = '#ffa502'; desc = '偏热 · 上涨股 ' + up + ' / ' + down + ' 下';
        } else if (score >= 45) {
            color = '#2ed573'; desc = '正常 · 上涨股 ' + up + ' / ' + down + ' 下';
        } else if (score >= 30) {
            color = '#ffa502'; desc = '偏冷 · 上涨股 ' + up + ' / ' + down + ' 下';
        } else {
            color = '#ff4757'; desc = '恐慌 · 上涨股 ' + up + ' / ' + down + ' 下';
        }

        bar.style.background = color;
        scoreEl.style.color = color;
        descEl.textContent = desc;
    });
}
